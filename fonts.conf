<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Only scan our custom fonts directory to save memory -->
  <dir>./fonts</dir>
  <cachedir>/tmp/fc-cache</cachedir>
  <config></config>
  
  <!-- Map standard font requests to our bundled Roboto-Bold font -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Arial</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Roboto-Bold</string>
    </edit>
  </match>
</fontconfig>
