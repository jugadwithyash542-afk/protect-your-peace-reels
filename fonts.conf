<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Only scan our custom fonts directory to save memory -->
  <dir>./fonts</dir>
  <cachedir>/tmp/fc-cache</cachedir>
  <config></config>
  
  <!-- Map standard font requests to our bundled Carlito font (Arial-metric, SIL OFL).
       Note: the previous target "Roboto-Bold" was never a real family name, and the bundled
       Roboto .ttf was a corrupt HTML download. Carlito is the real, valid family. -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Arial</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Carlito</string>
    </edit>
  </match>
</fontconfig>
